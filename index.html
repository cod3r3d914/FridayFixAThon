<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Fix-A-Thon Intro</title>
    <meta
      name="description"
      content="A Friday Fix-A-Thon intro animation for the NextGen Healthcare support team."
    />
    <meta name="theme-color" content="#041015" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="intro-stage" data-stage>
      <div class="flow flow-one" aria-hidden="true"></div>
      <div class="flow flow-two" aria-hidden="true"></div>
      <div class="pulse-line" aria-hidden="true"></div>

      <div class="support-motion" aria-hidden="true">
        <div class="ticket-card ticket-a">
          <span class="ticket-id">TKT-2184</span>
          <strong>Portal access</strong>
          <span class="ticket-status">Solved</span>
        </div>
        <div class="ticket-card ticket-b">
          <span class="ticket-id">TKT-2261</span>
          <strong>Claim edit</strong>
          <span class="ticket-status">Solved</span>
        </div>
        <div class="ticket-card ticket-c">
          <span class="ticket-id">TKT-2319</span>
          <strong>Rx routing</strong>
          <span class="ticket-status">Solved</span>
        </div>
        <div class="ticket-card ticket-d">
          <span class="ticket-id">TKT-2407</span>
          <strong>Schedule sync</strong>
          <span class="ticket-status">Solved</span>
        </div>

        <div class="metrics-cluster">
          <div class="metric-tile metric-one">
            <strong><span data-counter data-target="42">0</span></strong>
            <span>tickets solved</span>
          </div>
          <div class="metric-tile metric-two">
            <strong><span data-counter data-target="91">0</span>%</strong>
            <span>first-touch clarity</span>
          </div>
          <div class="metric-tile metric-three">
            <strong><span data-counter data-target="18">0</span>m</strong>
            <span>time returned</span>
          </div>
        </div>

        <div class="resolution-ring">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <section class="intro-copy" aria-label="Friday Fix-A-Thon intro">
        <p class="eyebrow">NextGen Healthcare Support</p>
        <h1 aria-label="Friday Fix-A-Thon">
          <span class="word word-friday">Friday</span>
          <span class="word word-fixathon">Fix-A-Thon</span>
        </h1>
        <p class="subline">Let's fix what matters.</p>
        <p class="host-line">Hosted by: Cody Allison</p>
      </section>

      <button class="start-button" type="button" data-start-intro>Start intro</button>
      <p class="audio-note" data-audio-note aria-live="polite"></p>

      <audio data-intro-audio src="assets/friday-fixathon-intro.mp3" preload="auto"></audio>
    </main>

    <script src="script.js"></script>
  </body>
</html>
